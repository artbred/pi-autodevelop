services:
  valkey:
    image: docker.io/valkey/valkey:8-alpine
    command: ["valkey-server", "--save", "", "--appendonly", "no"]
    restart: unless-stopped

  searxng:
    image: docker.io/searxng/searxng:latest
    restart: unless-stopped
    depends_on:
      - valkey
    ports:
      - "${SEARXNG_PORT:-8888}:8080"
    environment:
      FORCE_OWNERSHIP: "true"
      SEARXNG_SECRET: "${SEARXNG_SECRET:-change-me-before-exposing-publicly}"
      SEARXNG_BASE_URL: "${SEARXNG_BASE_URL:-http://localhost:${SEARXNG_PORT:-8888}/}"
      SEARXNG_VALKEY_URL: "valkey://valkey:6379/0"
    volumes:
      - ./config:/etc/searxng
      - ./data:/var/cache/searxng
